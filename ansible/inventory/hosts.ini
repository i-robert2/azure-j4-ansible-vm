# Static inventory used for the live playbook run.
#
# The J1 VMs have NO public IP — they are reached through an Azure Bastion
# tunnel. The CI workflow (or your local session) opens one tunnel per VM to a
# unique localhost port, then Ansible connects to 127.0.0.1:<port>.
#
#   web-01 -> 127.0.0.1:2201
#   web-02 -> 127.0.0.1:2202
#   db-01  -> 127.0.0.1:2203
#
# See .github/workflows/ansible.yml (open_tunnels step) and the README.

[webservers]
web-01 ansible_host=127.0.0.1 ansible_port=2201
web-02 ansible_host=127.0.0.1 ansible_port=2202

[databases]
db-01 ansible_host=127.0.0.1 ansible_port=2203

[all:vars]
ansible_user=azureuser
ansible_python_interpreter=/usr/bin/python3
